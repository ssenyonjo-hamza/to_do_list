<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <meta name="author" content="Ssenyonjo Hamza" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <ul class="todo-list">
      <li>
        <input type="checkbox" name="task" id="account" />
        <label for="account">Open Up a GitHub Account</label>
        <ul class="sub-item">
          <li><a class="sub-item-link" href="#" target="_blank">Sign up</a></li>
        </ul>
      </li>

      <li>
        <input type="checkbox" name="task" id="assignment" />
        <label for="assignment"
          >Complete JavaScript assignment on Odin Project</label
        >
        <ul class="sub-item">
          <li>
            <a class="sub-item-link" href="#" target="_blank"
              >Visit The Odin project
            </a>
          </li>
        </ul>
      </li>
      <input type="checkbox" name="task" id="read" />
      <label for="read">Read the Bible in the book of Daniel </label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="#" target="_blank">Read Now</a></li>
      </ul>
      <li></li>

      <li>
        <input type="checkbox" name="task" id="send" />
        <label for="send">Send an email to the FreeCodeCamp forum</label>
        <ul class="sub-item">
          <li>
            <a class="sub-item-link" href="#" target="_blank"
              >Open Email client</a
            >
          </li>
        </ul>
      </li>
    </ul>
  </body>
</html>
